{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5 col-lg-4 mt-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle shadow-sm mb-4"
                        style="width: 80px; height: 80px;">
                        <i class="bi bi-shield-lock fs-1"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Owner Login</h3>
                    <p class="text-muted small">Access the analytics dashboard</p>
                </div>
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i
                                    class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="username"
                                name="username" placeholder="admin" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i
                                    class="bi bi-lock"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="password"
                                name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold py-3">
                            Sign In <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
